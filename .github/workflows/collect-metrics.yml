name: Collect OpenClaw metrics

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/collect-metrics.yml"
      - "scripts/collect-github-data.mjs"

permissions:
  contents: write

concurrency:
  group: collect-openclaw-metrics
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect GitHub metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: openclaw/openclaw
        run: node scripts/collect-github-data.mjs

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- public/data/pulse.json; then
            echo "No metric changes"
            exit 0
          fi
          git config user.name "openclaw-pulse[bot]"
          git config user.email "openclaw-pulse[bot]@users.noreply.github.com"
          git add public/data/pulse.json
          git commit -m "data: refresh OpenClaw metrics"
          git push
